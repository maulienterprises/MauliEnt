<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mauli Enterprises — Login</title>
  <link rel="icon" href="./logo.png" type="image/png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a6fd4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="./logo.png" alt="Mauli Enterprises Logo" onerror="this.style.display='none'">
      <h2 style="font-family:'Arial Narrow',Arial,sans-serif;font-size:1.9rem;margin-top:12px;color:var(--accent);line-height:1.1;display:flex;flex-direction:column;align-items:center;gap:0"><span style="font-weight:700;color:#000">MAULI</span><span style="font-weight:400;color:#9c1c1c">ENTERPRISES</span></h2>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username"
             onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-error" id="login-lockout" style="color:var(--warning)"></div>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- App modules -->
<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/log.js"></script>
<script src="./js/auth.js"></script>
<script>
(function initSupabase() {
  try {
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: false }
    });
    window._supabase = client;
    setSupabaseDB(client);
  } catch(e) {
    console.error('Supabase init error:', e);
  }
})();

// On login success, redirect to app.html
const _origDoLogin = doLogin;
async function doLogin() {
  // Override: after login, redirect to app.html
  const username = document.getElementById('login-user').value.trim().toLowerCase();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) return showLoginError();

  const loginBtn = document.getElementById('login-btn');
  loginBtn.disabled = true;
  const orig = loginBtn.innerHTML;
  loginBtn.innerHTML = '<svg style="width:16px;height:16px;vertical-align:middle;animation:spin 0.8s linear infinite;margin-right:6px" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="28 56" stroke-linecap="round"/></svg>Signing in…';

  const lo = getLockout(username);
  if (lo.until > Date.now()) {
    loginBtn.disabled = false; loginBtn.innerHTML = orig;
    showLoginError();
    showLockoutMessage(username); return;
  }

  await loadUsersDB();
  const user  = DB.users.find(u => u.username.toLowerCase() === username && u.active !== false);
  const valid = user ? await verifyPassword(password, user) : false;

  if (!valid) {
    const newAttempts = (lo.attempts || 0) + 1;
    loginBtn.disabled = false; loginBtn.innerHTML = orig;
    if (newAttempts >= MAX_ATTEMPTS) {
      setLockout(username, { attempts: newAttempts, until: Date.now() + LOCKOUT_MS });
      showLockoutMessage(username);
    } else {
      setLockout(username, { attempts: newAttempts, until: 0 });
      showLoginError(`Invalid username or password. (${newAttempts}/${MAX_ATTEMPTS} attempts)`);
    }
    return;
  }

  clearLockout(username);
  const token = generateToken();
  setSessionToken(token);
  try { sessionStorage.setItem('mauli_current_user', JSON.stringify({ id: user.id, firstName: user.firstName, lastName: user.lastName, username: user.username, role: user.role, tabAccess: user.tabAccess || null })); } catch(e) {}
  window.location.href = './app.html';
}
</script>
</body>
</html>
